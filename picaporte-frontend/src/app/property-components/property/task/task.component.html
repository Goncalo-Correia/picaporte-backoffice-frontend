<div *ngIf="tasks.length > 0; else emptyTasks">
    <div class="accordion" id="accordionExample">
        <div *ngFor="let task of tasks; index as i" class="accordion-item">
          <h2 class="accordion-header">
            <button class="accordion-button d-flex align-items-center gap-3" type="button" data-bs-toggle="collapse" 
                    [attr.data-bs-target]="'#collapse' + i" 
                    [attr.aria-expanded]="false" 
                    [attr.aria-controls]="'collapse' + i">
                <div class="p-2 rounded text-white" 
                    [ngClass]="task.taskStatusId == enum_taskStatus.AVAILABLE ? 'bg-primary' : 
                    task.taskStatusId == enum_taskStatus.IN_PROGRESS ? 'bg-info' : 
                    task.taskStatusId == enum_taskStatus.APPROVED ? 'bg-success' : 'bg-danger'">
                    {{task.taskStatus.label}}
                </div>
                <div>
                    {{task.taskType.label}}
                </div>
            </button>
          </h2>
          <div [id]="'collapse' + i" class="accordion-collapse collapse" data-bs-parent="#accordionExample">
            <div class="accordion-body">
              <div class="mb-4">
                <label class="fw-bold mb-1">Descrição da tarefa</label>
                <div>{{task.taskType.description}}</div>
              </div>
              <div class="mb-3">
                <label class="fw-bold mb-1">Utilizador</label>
                <div>{{task.user != null ? task.user.firstName + " " + task.user.lastName : "-"}}</div>
              </div>
              <div class="mb-4">
                {{task.taskStatus.description}}
              </div>
              <div class="d-flex gap-3">
                  <button *ngIf="task.taskStatusId == enum_taskStatus.AVAILABLE" type="button" class="btn btn-primary" (click)="onClick_allocateTask(i)">Alocar</button>
                  <button *ngIf="task.taskStatusId == enum_taskStatus.IN_PROGRESS && task.user.email == userEmail" type="button" class="btn btn-success" (click)="onClick_taskAction(enum_taskStatus.APPROVED, i)">Completar</button>
                  <button *ngIf="task.taskStatusId == enum_taskStatus.IN_PROGRESS && task.user.email == userEmail" type="button" class="btn btn-danger" (click)="onClick_taskAction(enum_taskStatus.CANCELLED, i)">Cancelar</button>
              </div>
            </div>
          </div>
        </div>
    </div>
</div>
<ng-template #emptyTasks>
  <div class="d-flex flex-column align-items-center my-5">
    <i class="fa-solid fa-list-check fa-4x"></i>
    <div>Sem tarefas</div>
  </div>
</ng-template>
<app-message></app-message>
