<div class="row">
    <div *ngFor="let amenetieStructure of amenetieTypeStructureList; let i = index" class="col-3 mb-3">
        <div class="card">
            <div class="card-body">
                <div class="d-flex">
                    <div>
                        <input class="form-check-input" type="checkbox" [checked]="amenetieStructure.isSelected" id="amenetie.id" (change)="onChange_checkbox(i)">
                    </div>
                    <div class="px-2">{{amenetieStructure.amenetie.label}}</div>
                </div>
            </div>
        </div>
    </div>
</div>
