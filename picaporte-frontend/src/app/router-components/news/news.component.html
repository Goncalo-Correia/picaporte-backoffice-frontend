<div class="p-5 w-100">
    <div *ngIf="isOnListView" class="col-12 mb-3 d-flex justify-content-end">
        <div class="d-flex align-items-center fs-5 fw-bold cursor-pointer color-secondary" (click)="onClick_addNew()">
            <div class="me-2">
                Adicionar notícia
            </div>
            <i class="fa-solid fa-circle-plus"></i>
        </div>
    </div>
    <div *ngIf="isOnListView; else isOnDetailView" class="col-12">
        <div class="row">
            <div class="col-6">
                <div>
                    <table class="table">
                        <thead>
                            <tr>
                                <th scope="col">Notícias</th>
                            </tr>
                        </thead>
                        <tbody *ngIf="isDataFetched; else elseBlock">
                            <tr *ngFor="let _news of news; index as i" class="table-row cursor-pointer"
                                (click)="onClick_edit(i)">
                                <td class="p-4 rounded bg-white"><span class="col">{{_news.title}}</span></td>
                            </tr>
                        </tbody>
                        <ng-template #elseBlock>
                            <tbody>
                                <tr *ngFor="let number of [0,1,2,3,4]" class="placeholder-glow table-row">
                                    <td scope="row"><span class="placeholder col-4"></span></td>
                                    <td><span class="placeholder col-2"></span></td>
                                </tr>
                            </tbody>
                        </ng-template>
                    </table>
                </div>
                <div *ngIf="news.length == 0 && isDataFetched" class="w-100 p-4 text-center">
                    Não foram encontradas notícias
                </div>
            </div>
            <div class="col-6">
                <div>
                    <table class="table">
                        <thead>
                            <tr>
                                <th scope="col">Notícias online</th>
                            </tr>
                        </thead>
                        <tbody *ngIf="isDataFetched; else elseLoadingBlock">
                            <tr *ngFor="let _news of onlineNews; index as i" class="table-row cursor-pointer" (click)="onClick_editOnline(i)">
                                <td class="p-4 rounded bg-white"><span class="col">{{_news.title}}</span></td>
                            </tr>
                        </tbody>
                        <ng-template #elseLoadingBlock>
                            <tbody>
                                <div class="position-relative news-data-loader bg-white rounded">
                                    <app-spinner [showBackground]="false"></app-spinner>
                                </div>
                            </tbody>
                        </ng-template>
                    </table>
                </div>
                <div *ngIf="onlineNews.length == 0 && isDataFetched" class="w-100 p-4 text-center">
                    Não foram encontradas notícias online
                </div>
            </div>
        </div>
    </div>
    <ng-template #isOnDetailView>
        <div class="bg-white p-4 rounded h-100">
            <form>
                <div class="row">
                    <div class="col-12 mb-3">
                        <div class="d-flex flex-column align-items-center fs-5 fw-bold cursor-pointer color-secondary">
                            <div *ngIf="selectedNews.image.filename != ''" class="mb-3 d-flex justify-content-center">
                                <img *ngIf="selectedNews.image.content == null; else newSelectedImage" [src]="url + selectedNews.image.filename + '/true'" class="news-image rounded modal-property-image">
                                <ng-template #newSelectedImage>
                                  <img [src]="selectedNews.image.content" alt="..." class="news-image rounded modal-property-image">
                                </ng-template>
                              </div>
                              <div class="w-100 mb-3">
                                <label for="firstName" class="form-label fw-bold">Ficheiro</label>
                                <input type="file" class="form-control" id="file" name="file" (change)="onChange_file($event)">
                              </div>
                        </div>
                    </div>
                </div>
                <div class="row">
                    <div class="col mb-3">
                        <label for="reference" class="form-label fw-bold">Título</label>
                        <input type="text" class="form-control" id="reference" name="reference"
                            [(ngModel)]="selectedNews.title">
                    </div>
                    <div class="col-auto mb-3">
                        <label class="form-label fw-bold w-100">Online</label>
                        <div class="btn-group btn-group-lg w-100" role="group" aria-label="Basic mixed styles example">
                            <button type="button" class="btn btn-lg "
                                [ngClass]="selectedNews.isOnline ? 'btn-success' : 'btn-outline-success' "
                                (click)="onClick_selectedNewsOnline(true)">Sim</button>
                            <button type="button" class="btn btn-lg "
                                [ngClass]="selectedNews.isOnline  ? 'btn-outline-danger' : 'btn-danger' "
                                (click)="onClick_selectedNewsOnline(false)">Não</button>
                        </div>
                    </div>
                </div>
                <div class="mb-3">
                    <ckeditor [(ngModel)]="selectedNews.content" name="ckEitor-module"></ckeditor>
                </div>
                <div class="d-flex justify-content-between w-100">
                    <div>
                        <i *ngIf="selectedNewsIndex != -1" class="fa-solid fa-trash fa-2x text-danger cursor-pointer"
                            data-bs-toggle="modal" data-bs-target="#staticBackdrop"></i>
                    </div>
                    <div>
                        <button type="button" class="btn  me-2" data-bs-dismiss="modal"
                            (click)="onClick_close()">Cancelar</button>
                        <button type="submit" class="btn btn-success" data-bs-dismiss="modal"
                            (click)="onClick_submit()">Confirmar</button>
                    </div>
                </div>
            </form>
        </div>
    </ng-template>
</div>

<!-- Modal -->
<div class="modal" id="staticBackdrop" data-bs-backdrop="static" data-bs-keyboard="false" tabindex="-1"
    aria-labelledby="staticBackdropLabel" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="staticBackdropLabel">Remover notícia</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <div class="w-100 mb-3">
                    Tem a certeza que deseja remover esta notícia?
                </div>
                <div class="fw-bold">
                    {{selectedNews.title}}
                </div>
            </div>
            <div class="modal-footer">
                <div class="d-flex justify-content-between w-100">
                    <button type="button" class="btn  me-2" data-bs-dismiss="modal">Cancelar</button>
                    <button type="submit" class="btn btn-success" data-bs-dismiss="modal"
                        (click)="onClick_confirmDelete()">Confirmar</button>
                </div>
            </div>
        </div>
    </div>
</div>
<app-message></app-message>
