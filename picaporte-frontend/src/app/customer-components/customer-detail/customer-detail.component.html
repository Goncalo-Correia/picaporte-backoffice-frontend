<form>
  <div class="row">
    <div class="col mb-3">
      <label for="firstName" class="form-label fw-bold">Nome</label>
      <input type="text" class="form-control" id="firstName" name="firstName" [(ngModel)]="customer.firstName" (change)="triggerEvent_updateCustomerDetails()">
    </div>
  </div>
  <div class="row">
    <div class="col mb-3">
      <label for="lastName" class="form-label fw-bold">Sobrenome</label>
      <input type="text" class="form-control" id="lastName" name="lastName" [(ngModel)]="customer.lastName" (change)="triggerEvent_updateCustomerDetails()">
    </div>
  </div>
  <div class="row">
    <div class="col-6 mb-3">
      <label for="phoneNumber" class="form-label fw-bold">Telemóvel</label>
      <input type="text" class="form-control" id="phoneNumber" name="phoneNumber" [(ngModel)]="customer.phoneNumber" (change)="triggerEvent_updateCustomerDetails()">
    </div>
    <div class="col-6 mb-3">
      <label for="email" class="form-label fw-bold">Telemóvel</label>
      <input type="email" class="form-control" id="email" name="email" [(ngModel)]="customer.email" (change)="triggerEvent_updateCustomerDetails()">
    </div>
  </div>
  <div class="row">
    <div class="col-6 mb-3">
      <label for="cc" class="form-label fw-bold">CC</label>
      <input type="text" class="form-control" id="cc" name="cc" [(ngModel)]="customer.cc" (change)="triggerEvent_updateCustomerDetails()">
    </div>
    <div class="col-6 mb-3">
      <label for="nif" class="form-label fw-bold">NIF</label>
      <input type="text" class="form-control" id="nif" name="nif" [(ngModel)]="customer.nif" (change)="triggerEvent_updateCustomerDetails()">
    </div>
  </div>
</form>
