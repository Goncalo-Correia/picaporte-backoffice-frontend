<div class="d-flex h-100">
    <div class="submenu-container">
        <div class="h-100">
            <div class="submenu-grid">
                <div *ngFor="let submenu of userSubmenus" class="submenu-grid-item cursor-pointer" (click)="onClick_selectSubMenu(submenu.enum_userSubMenu)" [ngClass]="{'selected': submenu.enum_userSubMenu == selectedUserSubMenu}">
                    <div class="px-4 py-4">
                        <div class="fs-5 fw-bold mb-2">
                            {{submenu.label}}
                        </div>
                        <div class="text-muted fs-6">
                            {{submenu.description}}
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div class="p-5 w-100">

        <div class="row d-flex align-items-center mb-3">
            <div class="col-auto fs-4 fw-bold">
                <div *ngIf="isOnDetailsSubMenu" class="mb-3 fw-bold">Identificação</div>
                <div *ngIf="isOnPreferencesSubMenu" class="mb-3 fw-bold">Preferências</div>
                <div *ngIf="isOnActivityLogMenu" class="mb-3 fw-bold">Histórico do utilizador</div>
            </div>
            <div class="col d-flex justify-content-end gap-3">
                <button *ngIf="!isEditable && userId != 0" data-bs-toggle="modal" data-bs-target="#deleteModal" class="btn btn-danger">Eliminar utilizador</button>
                <button *ngIf="!isEditable" class="btn btn-picaporte-secondary" (click)="onClick_edit()">Editar</button>
                <button *ngIf="isEditable && userId != 0 && userId != null" class="btn btn-danger" (click)="onClick_cancel()">Cancelar</button>
                <button *ngIf="isEditable" class="btn btn-success" (click)="onClick_submit()">Submeter dados</button>
            </div>
        </div>

        <div *ngIf="isOnDetailsSubMenu" class="row">
            <div class="col-12 px-3">
                <div class="bg-white p-4 rounded h-100">
                    <app-user-detail *ngIf="isDataFetched" [user]="userStructure.user" [customerId]="userStructure.customerId" [customerName]="userStructure.customerName" [isEditable]="isEditable" [userValidationObject]="userValidationObject" (event_updateUserDetails)="eventHandler_updateUserDetails($event)"></app-user-detail>
                </div>
            </div>
        </div>
        <div *ngIf="isOnPreferencesSubMenu" class="row">
            <div class="col-12">
                <app-preferences *ngIf="isDataFetched" [preferences]="userStructure.preferences" [isEditable]="isEditable" (event_updatePreferences)="eventHandler_updateUserPreferences($event)"></app-preferences>
            </div>
        </div>
        <div *ngIf="isOnActivityLogMenu && isDataFetched" class="row">
            <div class="col-12">
                <app-activity-log [entityReferenceId]="userStructure.entityReferenceId"></app-activity-log>
            </div>
        </div>
    </div>
</div>

<!-- Modal -->
<div class="modal" id="deleteModal" data-bs-backdrop="static" data-bs-keyboard="false" tabindex="-1" aria-labelledby="staticBackdropLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="staticBackdropLabel">Eliminar Imóvel</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <form>
            <div class="mb-3">
                Ao eliminar o utilizador, todos os dados serão removidos do sistema e ficarão inacessíveis.
            </div>
          </form>
        </div>
        <div class="modal-footer">
          <div class="d-flex justify-content-end w-100">
            <div>
              <button type="button" class="btn  me-2" data-bs-dismiss="modal">Cancelar</button>
              <button type="button" class="btn btn-danger" data-bs-dismiss="modal" (click)="onClick_deleteUser()">Eliminar utilizador</button>
            </div>
          </div>
        </div>
      </div>
    </div>
</div>

<app-spinner *ngIf="isLoading"></app-spinner>

<app-message></app-message>
